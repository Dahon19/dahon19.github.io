<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dahon</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #2563eb;
        --border: #dbe3f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%, #e9eef7 100%);
        color: var(--text);
        padding: 24px;
      }

      .card {
        width: min(560px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
        color: var(--muted);
      }

      a {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 18px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Dahon Web Root</h1>
      <p>
        This root GitHub Pages site exists so AdMob can verify
        <code>app-ads.txt</code> at the domain root.
      </p>
      <p>
        Interna privacy policy remains hosted separately.
      </p>
      <div class="links">
        <a href="./app-ads.txt">Open app-ads.txt</a>
        <a href="https://dahon19.github.io/interna-privacy/">Open Interna Privacy Policy</a>
      </div>
    </main>
  </body>
</html>
